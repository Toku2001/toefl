<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEFL Word Pronunciation Index</title>
  <style>
    :root {
      --ink: #102a43;
      --muted: #486581;
      --paper: #f8fbff;
      --card: #ffffff;
      --line: #d9e2ec;
      --accent: #0f766e;
      --accent-2: #115e59;
      --accent-soft: #ccfbf1;
      --shadow: rgba(16, 42, 67, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Palatino", "Times New Roman", serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(34, 197, 94, 0.12), transparent 34%),
        radial-gradient(circle at 88% 10%, rgba(20, 184, 166, 0.14), transparent 30%),
        radial-gradient(circle at 88% 82%, rgba(14, 116, 144, 0.1), transparent 28%),
        linear-gradient(135deg, #f7fbff, #edf7f7 45%, #eefaf2);
      min-height: 100vh;
      padding: 26px 16px 40px;
    }

    .wrap {
      max-width: 1060px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(160deg, #ffffff, #f2fbf9);
      border: 1px solid #dcece8;
      border-radius: 18px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.4vw, 2.5rem);
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .meta {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: #1f2937;
      font-size: 0.9rem;
    }

    .chip {
      background: var(--accent-soft);
      border: 1px solid #99f6e4;
      border-radius: 999px;
      padding: 5px 10px;
      font-weight: 600;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(16, 42, 67, 0.08);
      padding: 14px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    input[type="search"] {
      width: min(520px, 100%);
      border: 1px solid #b7c5d3;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.96rem;
      font-family: inherit;
      color: var(--ink);
      background: #fbfdff;
    }

    input[type="search"]:focus {
      outline: 2px solid #0ea5a3;
      outline-offset: 1px;
      border-color: #14b8a6;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .item {
      opacity: 0;
      transform: translateY(8px);
      animation: reveal 320ms ease forwards;
    }

    .item a {
      display: block;
      text-decoration: none;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      background: #ffffff;
      transition: transform 110ms ease, border-color 110ms ease, box-shadow 110ms ease;
      line-height: 1.45;
    }

    .item a:hover {
      transform: translateY(-1px);
      border-color: #14b8a6;
      box-shadow: 0 8px 16px rgba(20, 184, 166, 0.15);
    }

    .label {
      font-weight: 700;
      display: block;
    }

    .path {
      color: var(--muted);
      font-size: 0.82rem;
      word-break: break-all;
      margin-top: 4px;
    }

    .empty {
      color: #7b8794;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    footer {
      margin-top: 14px;
      color: #5b6f82;
      font-size: 0.86rem;
      text-align: right;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body { padding: 16px 10px 30px; }
      .hero { padding: 16px; }
      .panel { padding: 10px; }
      .list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>TOEFL Pronunciation Hub</h1>
      <p class="sub">各分野の発音ページへ移動するためのルートページです。リンク先は既存の各フォルダ内 index.html で、音声は各ページの相対パスをそのまま使って再生されます。</p>
      <div class="meta">
        <span class="chip" id="totalCount">0 pages</span>
        <span class="chip" id="visibleCount">0 visible</span>
      </div>
    </section>

    <section class="panel" aria-label="pronunciation pages">
      <div class="controls">
        <input id="search" type="search" placeholder="科目名 / words番号 / パスで絞り込み" aria-label="ページ検索" />
      </div>
      <ul class="list" id="linkList"></ul>
      <p class="empty" id="emptyMessage" hidden>該当するページがありません。</p>
    </section>

    <footer>Generated for GitHub Pages navigation</footer>
  </div>

  <script>
    const pages = [
      { label: "AmericanHistory 06", path: "AmericanHistory/06words_pronunciation/index.html" },
      { label: "AmericanHistory 08", path: "AmericanHistory/08words_pronunciation/index.html" },
      { label: "AmericanHistory 09", path: "AmericanHistory/09words_pronunciation/index.html" },
      { label: "AmericanHistory 10", path: "AmericanHistory/10words_pronunciation/index.html" },
      { label: "Archaeology 03", path: "Archaeology/03/03words_pronunciation/index.html" },
      { label: "Archaeology 04", path: "Archaeology/04/04words_pronunciation/index.html" },
      { label: "Art 23", path: "Art/23words_pronunciation/index.html" },
      { label: "ArtHistory 05", path: "ArtHistory/05/05words_pronunciation/index.html" },
      { label: "Astronomy 33", path: "Astronomy/33words_pronunciation/index.html" },
      { label: "Astronomy 34", path: "Astronomy/34words_pronunciation/index.html" },
      { label: "Biology 37", path: "Biology/37words_pronunciation/index.html" },
      { label: "Biology 38", path: "Biology/38words_pronunciation/index.html" },
      { label: "Biology 39", path: "Biology/39words_pronunciation/index.html" },
      { label: "Biology 40", path: "Biology/40words_pronunciation/index.html" },
      { label: "Biology 41", path: "Biology/41words_pronunciation/index.html" },
      { label: "Biology 42", path: "Biology/42words_pronunciation/index.html" },
      { label: "Biology 43", path: "Biology/43words_pronunciation/index.html" },
      { label: "BusinessAsministration&Economics 11", path: "BusinessAsministration&Economics/11words_pronunciation/index.html" },
      { label: "ComputerScience 44", path: "ComputerScience/44words_pronunciation/index.html" },
      { label: "Crimiinology 19", path: "Crimiinology/19words_pronunciation/index.html" },
      { label: "EarthScience 45", path: "EarthScience/45words_pronunciation/index.html" },
      { label: "EarthScience 47", path: "EarthScience/47words_pronunciation/index.html" },
      { label: "Ecology 49", path: "Ecology/49words_pronunciation/index.html" },
      { label: "Economics 12", path: "Economics/12words_pronunciation/index.html" },
      { label: "Environmentology 13", path: "Environmentology/13words_pronunciation/index.html" },
      { label: "Geology 53", path: "Geology/53words_pronunciation/index.html" },
      { label: "Geology 54", path: "Geology/54words_pronunciation/index.html" },
      { label: "Geology 55", path: "Geology/55words_pronunciation/index.html" },
      { label: "History 07", path: "History/07words_pronunciation/index.html" },
      { label: "Law 18", path: "Law/18words_pronunciation/index.html" },
      { label: "Law pronunciation", path: "Law/pronunciation/index.html" },
      { label: "Linguistics 20", path: "Linguistics/20words_pronunciation/index.html" },
      { label: "Linguistics 21", path: "Linguistics/21words_pronunciation/index.html" },
      { label: "Literature 25", path: "Literature/25words_pronunciation/index.html" },
      { label: "MediaStudies 52", path: "MediaStudies/52words_pronunciation/index.html" },
      { label: "Medicine 56", path: "Medicine/56words_pronunciation/index.html" },
      { label: "Medicine 57", path: "Medicine/57words_pronunciation/index.html" },
      { label: "Medicine 58", path: "Medicine/58words_pronunciation/index.html" },
      { label: "Optics 51", path: "Optics/51words_pronunciation/index.html" },
      { label: "Philosophy 27", path: "Philosophy/27words_pronunciation/index.html" },
      { label: "Physics 59", path: "Physics/59words_pronunciation/index.html" },
      { label: "Physics 60", path: "Physics/60words_pronunciation/index.html" },
      { label: "PoliticalScience 30", path: "PoliticalScience/30words_pronunciation/index.html" },
      { label: "Psychology 29", path: "Psychology/29words_pronunciation/index.html" },
      { label: "Sociology 32", path: "Sociology/32words_pronunciation/index.html" },
      { label: "Theater 26", path: "Theater/26words_pronunciation/index.html" },
      { label: "VeterinaryStudy 36", path: "VeterinaryStudy/36words_pronunciation/index.html" },
      { label: "Women'sStudy 31", path: "Women'sStudy/31words_pronunciation/index.html" }
    ];

    const listEl = document.getElementById("linkList");
    const emptyEl = document.getElementById("emptyMessage");
    const searchEl = document.getElementById("search");
    const totalCountEl = document.getElementById("totalCount");
    const visibleCountEl = document.getElementById("visibleCount");

    function render(query) {
      const q = query.trim().toLowerCase();
      const filtered = pages.filter((p) => {
        if (!q) return true;
        return p.label.toLowerCase().includes(q) || p.path.toLowerCase().includes(q);
      });

      listEl.innerHTML = "";
      filtered.forEach((item, index) => {
        const li = document.createElement("li");
        li.className = "item";
        li.style.animationDelay = `${Math.min(index * 20, 480)}ms`;

        const a = document.createElement("a");
        a.href = item.path;

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = item.label;

        const path = document.createElement("span");
        path.className = "path";
        path.textContent = item.path;

        a.appendChild(label);
        a.appendChild(path);
        li.appendChild(a);
        listEl.appendChild(li);
      });

      emptyEl.hidden = filtered.length !== 0;
      visibleCountEl.textContent = `${filtered.length} visible`;
    }

    totalCountEl.textContent = `${pages.length} pages`;
    searchEl.addEventListener("input", (event) => {
      render(event.target.value || "");
    });

    render("");
  </script>
</body>
</html>
